address:
  nacos: 192.168.3.10:8848
  mysql:
    master: 192.168.3.10:3307
    slave1: 192.168.3.10:3308
    slave2: 192.168.3.10:3309

server:
  port: 8000
  ssl:
    key-store: classpath:keystore.jks
    key-store-password: xincan-0818
    key-password: xincan-0818
    key-alias: xincan
    key-store-type: PKCS12
  http2:
    enabled: true
  undertow:
    # 设置 HTTP POST 内容的最大长度，默认不做限制
    ## max-http-post-size: -1
    # 设置IO线程数, 它主要执行非阻塞的任务,它们会负责多个连接, 默认设置每个CPU核心一个线程,数量和CPU 内核数目一样即可
    io-threads: 16
    # 阻塞任务线程池, 当执行类似servlet请求阻塞操作, undertow会从这个线程池中取得线程,它的值设置取决于系统的负载  io-threads*8
    worker-threads: 108
    # 以下的配置会影响buffer,这些buffer会用于服务器连接的IO操作,有点类似netty的池化内存管理
    # 每块buffer的空间大小,越小的空间被利用越充分
    buffer-size: 1024
    # 每个区分配的buffer数量 , 所以pool的大小是buffer-size * buffers-per-region
    #   buffers-per-region: 1024 # 这个参数不需要写了
    # 是否分配的直接内存
    direct-buffers: true

spring:
  mvc:
    throw-exception-if-no-handler-found: true

  application:
    name: xincan-user
  profiles:
    active: dev

  cloud:
    nacos:
      config:
        namespace: xincan-${spring.profiles.active}-0001
        server-addr: ${address.nacos}        # 配置中心url
        group: ${spring.profiles.active}_group
        file-extension: yaml                  # 配置文件类型
      discovery:
        server-addr: ${address.nacos}
        group: ${spring.profiles.active}_group
        namespace: xincan-${spring.profiles.active}-0001

  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${address.mysql.master}/nacos-${spring.profiles.active}?useSSL=true&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&autoReconnect=true&failOverReadOnly=false&allowMultiQueries=true&serverTimezone=GMT
      username: root
      password: root
    slave1:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${address.mysql.slave1}/nacos-${spring.profiles.active}?useSSL=true&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&autoReconnect=true&failOverReadOnly=false&allowMultiQueries=true&serverTimezone=GMT
      username: root
      password: root
    slave2:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${address.mysql.slave2}/nacos-${spring.profiles.active}?useSSL=true&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&autoReconnect=true&failOverReadOnly=false&allowMultiQueries=true&serverTimezone=GMT
      username: root
      password: root

management:
  metrics:
    export:
      prometheus:
        step: 1m
  web:
    server:
      auto-time-requests: true
  endpoints:
    prometheus:
      id: ${spring.application.name}
    web:
      exposure:
        #        include: '*'
        include: health,info,env,prometheus,metrics,httptrace,threaddump,heapdump,${spring.application.name},nacos-config
