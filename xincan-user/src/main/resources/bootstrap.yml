server:
  port: 8000

spring:
  application:
    name: xincan-user
  profiles:
    active: dev

  cloud:
    nacos:
      config:
        namespace: xincan-${spring.profiles.active}-0001
        server-addr: 192.168.1.50:8848        # 配置中心url
        group: ${spring.profiles.active}_group
        file-extension: yaml                  # 配置文件类型
      discovery:
        server-addr: 192.168.1.50:8848
        group: ${spring.profiles.active}_group
        namespace: xincan-${spring.profiles.active}-0001

  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://192.168.1.50:3307/xincan?useSSL=true&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&autoReconnect=true&failOverReadOnly=false&allowMultiQueries=true&serverTimezone=GMT
      username: root
      password: root
    slave1:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://192.168.1.50:3308/xincan?useSSL=true&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&autoReconnect=true&failOverReadOnly=false&allowMultiQueries=true&serverTimezone=GMT
      username: root
      password: root
    slave2:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://192.168.1.50:3309/xincan?useSSL=true&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&autoReconnect=true&failOverReadOnly=false&allowMultiQueries=true&serverTimezone=GMT
      username: root
      password: root

management:
  metrics:
    export:
      prometheus:
        enabled: true
        step: 1m
        descriptions: true
  web:
    server:
      auto-time-requests: true
  endpoints:
    prometheus:
      id: ${spring.application.name}
    web:
      exposure:
#        include: '*'
        include: health,info,env,prometheus,metrics,httptrace,threaddump,heapdump,${spring.application.name},nacos-config
